<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="popupTitle">Forvo Helper</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1 data-i18n="popupTitle">Forvo Helper</h1>
        <button id="optionsButton" class="icon-button" type="button" data-i18n-title="popupOpenOptions" title="Options">⚙</button>
      </header>

      <dl class="status-list">
        <div>
          <dt data-i18n="popupTodaySubmitted">Today</dt>
          <dd id="todaySubmittedCount">0 submitted</dd>
        </div>
        <div>
          <dt data-i18n="popupRecordingHistory7Days">7 days</dt>
          <dd id="history7DayCount">0</dd>
        </div>
        <div>
          <dt data-i18n="popupRecordingHistory30Days">30 days</dt>
          <dd id="history30DayCount">0</dd>
        </div>
      </dl>

      <section class="history-card" aria-labelledby="recordingHistoryHeading">
        <h2 id="recordingHistoryHeading" data-i18n="popupRecordingHistory">Recording history</h2>
        <div id="popupRecordingHeatmap" class="history-heatmap history-heatmap--popup" role="img"></div>
      </section>

      <section class="profile-stat" aria-labelledby="profileStatsHeading">
        <div>
          <h2 id="profileStatsHeading" data-i18n="popupForvoTotal">Forvo total</h2>
          <strong id="profilePronunciationCount" data-i18n="popupProfileNotRefreshed">Not refreshed yet</strong>
          <p id="profileStatsMeta"></p>
        </div>
        <button id="refreshProfileStatsButton" class="button profile-stat__refresh" type="button" data-i18n="popupRefreshProfileStats">Refresh</button>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
