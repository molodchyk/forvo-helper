<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="popupTitle">Forvo Helper</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1 data-i18n="popupTitle">Forvo Helper</h1>
        <button id="optionsButton" class="icon-button" type="button" data-i18n-title="popupOpenOptions" title="Options">⚙</button>
      </header>

      <dl class="status-list">
        <div>
          <dt data-i18n="popupCurrentWord">Current word</dt>
          <dd id="currentWord" data-i18n="popupNoWord">No Forvo word detected</dd>
        </div>
        <div>
          <dt data-i18n="popupStress">Stress</dt>
          <dd id="stressState" data-i18n="popupStressUnknown">Not checked yet</dd>
        </div>
        <div>
          <dt data-i18n="popupTodaySubmitted">Today</dt>
          <dd id="todaySubmittedCount">0 submitted</dd>
        </div>
      </dl>

      <section class="history-card" aria-labelledby="recordingHistoryHeading">
        <div class="history-card__header">
          <div>
            <h2 id="recordingHistoryHeading" data-i18n="popupRecordingHistory">Recording history</h2>
            <p class="history-summary">
              <span data-i18n="popupRecordingHistory7Days">7 days</span>
              <strong id="history7DayCount">0</strong>
              <span data-i18n="popupRecordingHistory30Days">30 days</span>
              <strong id="history30DayCount">0</strong>
            </p>
          </div>
          <button id="clearRecordingHistoryButton" class="button history-card__clear" type="button" data-i18n="popupClearRecordingHistory">Clear history</button>
        </div>
        <div id="recordingHeatmap" class="history-heatmap" role="img"></div>
        <div id="clearRecordingHistoryConfirm" class="clear-confirm" hidden>
          <span data-i18n="popupClearRecordingHistoryPrompt">Clear recording history?</span>
          <button id="confirmClearRecordingHistoryButton" class="button button--danger" type="button" data-i18n="popupClearRecordingHistoryConfirm">Confirm</button>
          <button id="cancelClearRecordingHistoryButton" class="button" type="button" data-i18n="popupClearRecordingHistoryCancel">Cancel</button>
        </div>
        <p id="recordingHistoryStatus" class="history-status" role="status" aria-live="polite"></p>
      </section>

      <section class="profile-stat" aria-labelledby="profileStatsHeading">
        <div>
          <h2 id="profileStatsHeading" data-i18n="popupForvoTotal">Forvo total</h2>
          <strong id="profilePronunciationCount" data-i18n="popupProfileNotRefreshed">Not refreshed yet</strong>
          <p id="profileStatsMeta"></p>
        </div>
        <button id="refreshProfileStatsButton" class="button profile-stat__refresh" type="button" data-i18n="popupRefreshProfileStats">Refresh</button>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
